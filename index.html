<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏓 Classement Ping Pong</title>
  <style>
    :root {
      --bg:       #0c0c12;
      --surface:  #14141e;
      --surface2: #1c1c2a;
      --border:   #2a2a3a;
      --text:     #e8e8f0;
      --muted:    #666680;
      --accent:   #7c6af0;
      --green:    #4ade80;
      --red:      #f87171;
      --gold:     #f59e0b;
      --silver:   #9ca3af;
      --bronze:   #b45309;
      /* Couleurs du podium — modifiables facilement */
      --rank1:    #ffd24a;
      --rank2:    #cdd3dc;
      --rank3:    #e8915a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1030 0%, #0c0c12 60%);
      border-bottom: 1px solid var(--border);
      padding: 28px 24px 0;
      text-align: center;
    }
    header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }
    #subtitle { margin-top: 6px; font-size: 0.85rem; color: var(--muted); }

    #season-select {
      margin-top: 12px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }
    #season-select:focus { outline: none; border-color: var(--accent); }

    /* ── Badges ── */
    #badges {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }
    .badge-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 11px;
    }
    .badge-card .b-icon  { font-size: 1.6rem; flex-shrink: 0; }
    .badge-card .b-label { font-size: 0.66rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .badge-card .b-name  { font-weight: 700; font-size: 0.9rem; margin: 1px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge-card .b-detail{ font-size: 0.72rem; color: var(--muted); }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-top: 20px;
    }
    .tab-btn {
      padding: 10px 24px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── Layout ── */
    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 16px 64px;
    }

    /* ── Podium ── */
    #podium {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 12px;
      margin-bottom: 40px;
    }

    .podium-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 14px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      flex: 1;
      max-width: 200px;
      position: relative;
    }
    .podium-card:hover { transform: translateY(-4px); }
    .podium-card.p1 {
      order: 2; padding-top: 26px;
      border-color: var(--rank1);
      background: linear-gradient(180deg, rgba(255,210,74,0.10) 0%, var(--surface) 55%);
      box-shadow: 0 0 28px -8px rgba(255,210,74,0.5);
      transform: translateY(-6px);
    }
    .podium-card.p1:hover { transform: translateY(-10px); }
    .podium-card.p2 { border-color: var(--rank2)66; order: 1; }
    .podium-card.p3 { border-color: var(--rank3)55; order: 3; }

    .podium-medal { font-size: 1.8rem; margin-bottom: 8px; }
    .podium-name  { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .podium-card.p1 .podium-name { color: var(--rank1); text-shadow: 0 0 10px rgba(255,210,74,0.4); font-size: 1rem; }
    .podium-card.p2 .podium-name { color: var(--rank2); }
    .podium-card.p3 .podium-name { color: var(--rank3); }
    .podium-card.p1 .podium-elo  { font-size: 1.6rem; color: var(--rank1); }
    .podium-elo   { font-size: 1.4rem; font-weight: 800; color: var(--accent); }
    .podium-record{ font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

    /* ── Section title ── */
    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      margin-top: 36px;
    }

    /* ── Leaderboard ── */
    .player-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      margin-bottom: 6px;
      background: var(--surface);
      border-radius: 10px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .player-row:hover { background: var(--surface2); border-color: var(--accent)44; }
    .player-rank  { width: 28px; text-align: center; font-size: 0.85rem; color: var(--muted); flex-shrink: 0; }
    .player-name  { flex: 1; font-weight: 600; font-size: 0.95rem; }
    .player-elo   { font-weight: 700; color: var(--accent); font-size: 1rem; }
    .player-record{ font-size: 0.78rem; color: var(--muted); min-width: 70px; text-align: right; }
    .player-wr    { font-size: 0.78rem; color: var(--green); min-width: 36px; text-align: right; }

    /* ── Matches ── */
    .match-row {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      margin-bottom: 6px;
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
      gap: 8px;
      font-size: 0.88rem;
    }
    .match-winner { font-weight: 600; color: var(--green); flex: 1; }
    .match-delta  { font-size: 0.75rem; color: var(--muted); }
    .match-vs     { color: var(--border); font-size: 0.75rem; }
    .match-loser  { color: var(--red); flex: 1; }
    .match-meta   { font-size: 0.72rem; color: var(--muted); margin-left: auto; white-space: nowrap; }
    .match-elo    { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
    .avatar       { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
    .avatar-sm    { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--surface2); }

    /* ── Recherche matchs ── */
    #match-search {
      width: 100%;
      padding: 9px 14px;
      margin-bottom: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.88rem;
    }
    #match-search:focus { outline: none; border-color: var(--accent); }
    #match-search::placeholder { color: var(--muted); }

    /* ── Pagination ── */
    #pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 16px;
    }
    .page-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: border-color 0.12s;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--accent); }
    .page-btn:disabled { opacity: 0.3; cursor: default; }
    #page-info { font-size: 0.82rem; color: var(--muted); min-width: 80px; text-align: center; }

    /* ── Modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #00000088;
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #modal-overlay.open { display: flex; }

    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      width: 100%;
      max-width: 420px;
      padding: 28px;
      position: relative;
      animation: pop 0.18s ease;
    }
    @keyframes pop {
      from { transform: scale(0.95); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    #modal-close {
      position: absolute;
      top: 16px; right: 16px;
      background: var(--surface2);
      border: none;
      color: var(--muted);
      width: 30px; height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
    }
    #modal-close:hover { color: var(--text); }

    #modal-name {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 20px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .stat-box {
      background: var(--surface2);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .stat-box .val { font-size: 1.3rem; font-weight: 800; color: var(--accent); }
    .stat-box .lbl { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface2);
      border-radius: 10px;
      margin-bottom: 8px;
      font-size: 0.88rem;
    }
    .stat-row .icon { font-size: 1.1rem; }
    .stat-row .info { flex: 1; }
    .stat-row .name { font-weight: 600; }
    .stat-row .count { font-size: 0.75rem; color: var(--muted); }

    .loading { color: var(--muted); padding: 8px 0; font-size: 0.88rem; }

    /* ── Graph tab ── */
    #graph-controls {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
    }
    #graph-controls .controls-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }
    #player-checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .player-check {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .player-check:hover { background: #22223a; }
    .player-check.checked { border-color: var(--color, var(--accent)); background: color-mix(in srgb, var(--color, var(--accent)) 15%, var(--surface2)); }
    .player-check input { display: none; }
    .player-check .check-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--color, var(--accent));
      opacity: 0.3;
      transition: opacity 0.15s;
    }
    .player-check.checked .check-dot { opacity: 1; }

    #chart-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      position: relative;
      height: 420px;
    }
    #chart-container canvas { max-height: 100%; }

    .btn-toggle-all {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
      float: right;
      margin-top: -2px;
    }
    .btn-toggle-all:hover { color: var(--text); }
  </style>
</head>
<body>

<header>
  <h1>🏓 Ping Pong <span>ELO</span></h1>
  <p id="subtitle">Chargement...</p>
  <select id="season-select" onchange="onSeasonChange()"></select>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('classement', this)">🏆 Classement</button>
    <button class="tab-btn" onclick="switchTab('graph', this)">📈 Graphique ELO</button>
  </div>
</header>

<main>

  <!-- ── Onglet Classement ── -->
  <div id="tab-classement" class="tab-pane active">
    <div id="podium"></div>

    <div id="badges-section" style="display:none">
      <p class="section-title">🏅 Palmarès de la saison</p>
      <div id="badges"></div>
    </div>

    <p class="section-title">Classement complet</p>
    <div id="leaderboard"></div>

    <p class="section-title">Historique des matchs</p>
    <input id="match-search" placeholder="🔍 Rechercher un joueur..." autocomplete="off" />
    <div id="matches-list"></div>
    <div id="pagination">
      <button class="page-btn" id="btn-prev" onclick="changePage(-1)" disabled>← Précédent</button>
      <span id="page-info"></span>
      <button class="page-btn" id="btn-next" onclick="changePage(1)">Suivant →</button>
    </div>
  </div>

  <!-- ── Onglet Graphique ── -->
  <div id="tab-graph" class="tab-pane">
    <div id="graph-controls">
      <div class="controls-title">
        Joueurs
        <button class="btn-toggle-all" onclick="toggleAllPlayers()">Tout cocher / décocher</button>
      </div>
      <div id="player-checkboxes"><p class="loading">Chargement...</p></div>
    </div>
    <div id="chart-container">
      <canvas id="elo-chart-canvas"></canvas>
    </div>
  </div>

</main>

<!-- Modal stats joueur -->
<div id="modal-overlay">
  <div id="modal">
    <button id="modal-close">✕</button>
    <div id="modal-name"></div>
    <div id="modal-content"><p class="loading">Chargement...</p></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL      = 'https://xrzusqhfmdybrvwepcmv.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhyenVzcWhmbWR5YnJ2d2VwY212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTQ0MzksImV4cCI6MjA5MjI5MDQzOX0.XUXI14nrxuVTusXCX5lmFdBxMppz3Nu5NNNE2CIGO_I';
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const MEDALS = ['🥇', '🥈', '🥉'];
  const PLACEMENT_THRESHOLD = 5;
  const CHART_COLORS = [
    '#7c6af0','#4ade80','#f87171','#fbbf24','#60a5fa',
    '#f472b6','#34d399','#fb923c','#a78bfa','#38bdf8','#e879f9','#84cc16',
  ];

  // ── Vache à lait ─────────────────────────────────────────────────────────────
  let vacheId = null;
  function computeVache(players) {
    const eligible = players.filter(p => (p.wins + p.losses) >= 10);
    if (eligible.length === 0) return null;
    return eligible.reduce((worst, p) => p.winrate < worst.winrate ? p : worst).id;
  }
  function cow(id) { return vacheId && id === vacheId ? ' 🐮🥛' : ''; }

  // ── Saisons ─────────────────────────────────────────────────────────────────
  let SEASONS      = [];
  let viewedSeason = null;

  async function loadSeasons() {
    const { data } = await sb.from('seasons').select('*').order('id', { ascending: false });
    SEASONS = data ?? [];
    if (SEASONS.length === 0) {
      // Pas de table seasons : on simule une saison courante unique
      SEASONS = [{ id: 1, label: 'Saison 1', started_at: '2000-01-01', ended_at: null }];
    }
    viewedSeason = SEASONS[0];
    const sel = document.getElementById('season-select');
    sel.innerHTML = SEASONS.map(s =>
      `<option value="${s.id}">${escHtml(s.label)}${s.ended_at ? '' : ' (en cours)'}</option>`).join('');
    sel.value = viewedSeason.id;
    sel.style.display = SEASONS.length > 1 ? '' : 'none';
  }

  const isCurrentSeason = () => viewedSeason && !viewedSeason.ended_at;

  // Applique le filtre de date de la saison sur une requête `matches`
  function seasonFilterMatches(query) {
    if (!viewedSeason) return query;
    query = query.gte('played_at', viewedSeason.started_at);
    if (viewedSeason.ended_at) query = query.lt('played_at', viewedSeason.ended_at);
    return query;
  }

  window.onSeasonChange = () => {
    const id = document.getElementById('season-select').value;
    viewedSeason = SEASONS.find(s => String(s.id) === String(id)) ?? SEASONS[0];
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
    currentPage = 0;
    searchIds = null;
    document.getElementById('match-search').value = '';
    loadLeaderboard();
    loadMatches(0);
    if (document.getElementById('tab-graph').classList.contains('active')) loadGraph();
  };

  // ── Tabs ──────────────────────────────────────────────────────────────────────
  function setActiveTab(name) {
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name)?.classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => {
      if (b.getAttribute('onclick')?.includes(`'${name}'`)) b.classList.add('active');
    });
  }

  window.switchTab = (name, btn) => {
    setActiveTab(name);
    history.replaceState(null, '', '#' + name);
    if (name === 'graph' && !chartInstance) loadGraph();
  };

  // Activer le bon onglet visuellement dès le départ
  const initTab = location.hash.replace('#', '') || 'classement';
  setActiveTab(initTab);

  // ── Leaderboard ──────────────────────────────────────────────────────────────

  async function loadLeaderboard() {
    let data;
    if (isCurrentSeason()) {
      const res = await sb.from('leaderboard').select('*').order('rank');
      data = res.data;
    } else {
      const res = await sb.from('season_results').select('*').eq('season', viewedSeason.id).order('rank');
      data = (res.data ?? []).map(p => {
        const total = p.wins + p.losses;
        return { ...p, winrate: total > 0 ? Math.round(p.wins / total * 100) : 0 };
      });
    }
    if (!data || data.length === 0) {
      document.getElementById('podium').innerHTML = '';
      document.getElementById('leaderboard').innerHTML = '<p class="loading">Aucun joueur pour cette saison.</p>';
      document.getElementById('badges-section').style.display = 'none';
      return;
    }

    vacheId = computeVache(data);

    // En saison passée, tout le monde est "classé" (figé). En cours : seuil de placement.
    const ranked     = isCurrentSeason() ? data.filter(p => (p.wins + p.losses) >= PLACEMENT_THRESHOLD) : data;
    const placements = isCurrentSeason() ? data.filter(p => (p.wins + p.losses) <  PLACEMENT_THRESHOLD) : [];

    const [{ count: totalMatches }, { count: seasonMatches }] = await Promise.all([
      sb.from('matches').select('*', { count: 'exact', head: true }),
      seasonFilterMatches(sb.from('matches').select('*', { count: 'exact', head: true })),
    ]);
    const seasonLabel = isCurrentSeason() ? 'cette saison' : 'en ' + viewedSeason.label.toLowerCase();
    document.getElementById('subtitle').textContent =
      `${ranked.length} joueurs classés · ${totalMatches ?? 0} matchs (${seasonMatches ?? 0} ${seasonLabel})`;

    loadBadges(data);

    // Podium top 3
    const top3 = ranked.slice(0, 3);
    document.getElementById('podium').innerHTML = top3.map((p, i) => `
      <div class="podium-card p${i+1}" onclick="openModal('${p.id}', '${escHtml(p.display_name)}')">
        ${p.avatar_url ? `<img class="avatar" style="width:44px;height:44px;margin:0 auto 8px" src="${p.avatar_url}" alt="">` : `<div class="podium-medal">${MEDALS[i]}</div>`}
        <div class="podium-name">${MEDALS[i]} ${escHtml(p.display_name)}${cow(p.id)}</div>
        <div class="podium-elo">${p.elo}</div>
        <div class="podium-record">${p.wins}V · ${p.losses}D · ${p.winrate}%</div>
      </div>`).join('');

    // Full list (rank 4+)
    document.getElementById('leaderboard').innerHTML = ranked.slice(3).map((p, i) => `
      <div class="player-row" onclick="openModal('${p.id}', '${escHtml(p.display_name)}')">
        <span class="player-rank">${i + 4}</span>
        ${p.avatar_url ? `<img class="avatar-sm" src="${p.avatar_url}" alt="">` : ''}
        <span class="player-name">${escHtml(p.display_name)}${cow(p.id)}</span>
        <span class="player-wr">${p.winrate}%</span>
        <span class="player-record">${p.wins}V / ${p.losses}D</span>
        <span class="player-elo">${p.elo}</span>
      </div>`).join('') || '';

    // Joueurs en placement
    if (placements.length > 0) {
      document.getElementById('leaderboard').innerHTML += `
        <p class="section-title" style="margin-top:24px">🎯 En placement</p>
        ${placements.map(p => `
        <div class="player-row" onclick="openModal('${p.id}', '${escHtml(p.display_name)}')">
          ${p.avatar_url ? `<img class="avatar-sm" src="${p.avatar_url}" alt="">` : ''}
          <span class="player-name" style="color:var(--muted)">${escHtml(p.display_name)}</span>
          <span style="font-size:0.78rem;color:var(--muted);margin-left:auto">${p.wins + p.losses}/${PLACEMENT_THRESHOLD} parties</span>
        </div>`).join('')}`;
    }
  }

  // ── Badges de saison ──────────────────────────────────────────────────────────

  async function loadBadges(standings) {
    const section = document.getElementById('badges-section');

    let mq = sb.from('matches').select('winner_id, loser_id, winner_delta, loser_delta, played_at').order('played_at');
    mq = seasonFilterMatches(mq);
    const [{ data: matches }, { data: top1 }] = await Promise.all([
      mq,
      sb.from('top1_log').select('player_id, started_at, ended_at'),
    ]);

    const badges = computeBadges(matches ?? [], standings, top1 ?? []);
    if (badges.length === 0) { section.style.display = 'none'; return; }

    document.getElementById('badges').innerHTML = badges.map(b => `
      <div class="badge-card">
        <span class="b-icon">${b.icon}</span>
        <div style="min-width:0">
          <div class="b-label">${escHtml(b.label)}</div>
          <div class="b-name">${escHtml(b.name)}</div>
          <div class="b-detail">${escHtml(b.detail)}</div>
        </div>
      </div>`).join('');
    section.style.display = '';
  }

  function computeBadges(matches, standings, top1) {
    const pmap = {};
    for (const p of standings) pmap[p.id] = p;
    const nameOf = id => pmap[id]?.display_name ?? '???';

    const wl = {}, delta = {};
    for (const m of matches) {
      (wl[m.winner_id] ??= { w: 0, l: 0 }).w++;
      (wl[m.loser_id]  ??= { w: 0, l: 0 }).l++;
      delta[m.winner_id] = (delta[m.winner_id] ?? 0) + m.winner_delta;
      delta[m.loser_id]  = (delta[m.loser_id]  ?? 0) + m.loser_delta;
    }

    const out = [];
    const MIN = 10;

    // 🏆 Champion (rang 1)
    const champ = standings.find(p => p.rank === 1) ?? standings[0];
    if (champ) out.push({ icon: '🏆', label: 'Champion', name: champ.display_name, detail: `${champ.elo} ELO` });

    // 🔥 Meilleur WR / 🐮 Vache à lait (min 10 matchs)
    const wr = e => e[1].w / (e[1].w + e[1].l);
    const eligible = Object.entries(wl).filter(([id, v]) => (v.w + v.l) >= MIN);
    if (eligible.length) {
      const best  = eligible.reduce((a, b) => wr(a) >= wr(b) ? a : b);
      const worst = eligible.reduce((a, b) => wr(a) <= wr(b) ? a : b);
      out.push({ icon: '🔥', label: 'Meilleur winrate', name: nameOf(best[0]),  detail: `${Math.round(wr(best) * 100)}% (${best[1].w}V/${best[1].l}D)` });
      out.push({ icon: '🐮', label: 'Vache à lait',     name: nameOf(worst[0]), detail: `${Math.round(wr(worst) * 100)}% (${worst[1].w}V/${worst[1].l}D)` });
    }

    // 🏓 Plus actif
    const active = Object.entries(wl).map(([id, v]) => [id, v.w + v.l]).sort((a, b) => b[1] - a[1])[0];
    if (active) out.push({ icon: '🏓', label: 'Plus actif', name: nameOf(active[0]), detail: `${active[1]} matchs` });

    // 📈 Plus grosse progression ELO sur la saison
    const prog = Object.entries(delta).sort((a, b) => b[1] - a[1])[0];
    if (prog && prog[1] > 0) out.push({ icon: '📈', label: 'Plus grosse progression', name: nameOf(prog[0]), detail: `+${prog[1]} ELO` });

    // 😈 Plus grosse bête noire (domination max sur un joueur)
    const pair = {};
    for (const m of matches) { const k = m.winner_id + '>' + m.loser_id; pair[k] = (pair[k] ?? 0) + 1; }
    const topPair = Object.entries(pair).sort((a, b) => b[1] - a[1])[0];
    if (topPair && topPair[1] >= 3) {
      const [w, l] = topPair[0].split('>');
      out.push({ icon: '😈', label: 'Plus grosse bête noire', name: nameOf(w), detail: `${topPair[1]} victoires vs ${nameOf(l)}` });
    }

    // ⚡ Plus longue série de victoires
    const byPlayer = {};
    for (const m of matches) {
      (byPlayer[m.winner_id] ??= []).push({ t: m.played_at, won: true });
      (byPlayer[m.loser_id]  ??= []).push({ t: m.played_at, won: false });
    }
    let streak = { id: null, n: 0 };
    for (const [id, arr] of Object.entries(byPlayer)) {
      arr.sort((a, b) => a.t < b.t ? -1 : 1);
      let cur = 0, mx = 0;
      for (const g of arr) { if (g.won) { cur++; mx = Math.max(mx, cur); } else cur = 0; }
      if (mx > streak.n) streak = { id, n: mx };
    }
    if (streak.n >= 3) out.push({ icon: '⚡', label: 'Plus longue série', name: nameOf(streak.id), detail: `${streak.n} victoires d'affilée` });

    // 👑 Roi du trône (jours passés n°1 sur la saison)
    const start = new Date(viewedSeason.started_at).getTime();
    const end   = viewedSeason.ended_at ? new Date(viewedSeason.ended_at).getTime() : Date.now();
    const days = {};
    for (const r of top1) {
      const s = Math.max(new Date(r.started_at).getTime(), start);
      const e = Math.min(r.ended_at ? new Date(r.ended_at).getTime() : Date.now(), end);
      if (e > s) days[r.player_id] = (days[r.player_id] ?? 0) + (e - s);
    }
    const king = Object.entries(days).sort((a, b) => b[1] - a[1])[0];
    if (king) {
      const d = Math.floor(king[1] / 86400000);
      out.push({ icon: '👑', label: 'Roi du trône', name: nameOf(king[0]), detail: `${d} jour${d > 1 ? 's' : ''} n°1` });
    }

    return out;
  }

  // ── Matches ──────────────────────────────────────────────────────────────────

  const PER_PAGE = 10;
  let currentPage = 0;
  let searchIds   = null; // null = pas de filtre ; [] = aucun joueur trouvé

  async function loadMatches(page = currentPage) {
    const from = page * PER_PAGE;
    const to   = from + PER_PAGE - 1;
    const el   = document.getElementById('matches-list');

    if (searchIds !== null && searchIds.length === 0) {
      el.innerHTML = '<p class="loading">Aucun joueur trouvé.</p>';
      document.getElementById('page-info').textContent = '';
      document.getElementById('btn-prev').disabled = true;
      document.getElementById('btn-next').disabled = true;
      return;
    }

    let query = sb
      .from('matches')
      .select('id, format, winner_id, loser_id, winner_delta, loser_delta, winner_elo_before, loser_elo_before, played_at, winner:players!matches_winner_id_fkey(display_name, avatar_url), loser:players!matches_loser_id_fkey(display_name, avatar_url)', { count: 'exact' })
      .order('played_at', { ascending: false });

    query = seasonFilterMatches(query);

    if (searchIds !== null) {
      const list = searchIds.map(id => `"${id}"`).join(',');
      query = query.or(`winner_id.in.(${list}),loser_id.in.(${list})`);
    }

    const { data, count } = await query.range(from, to);

    if (!data || data.length === 0) { el.innerHTML = '<p class="loading">Aucun match.</p>'; return; }

    const totalPages = Math.ceil(count / PER_PAGE);

    el.innerHTML = data.map(m => {
      const date    = new Date(m.played_at).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
      const wBefore = m.winner_elo_before;
      const lBefore = m.loser_elo_before;
      const wElo    = wBefore != null ? `<span class="match-elo">${wBefore} → ${wBefore + m.winner_delta}</span>` : `<span class="match-delta" style="color:var(--green)">+${m.winner_delta}</span>`;
      const lElo    = lBefore != null ? `<span class="match-elo">${lBefore} → ${lBefore + m.loser_delta}</span>` : `<span class="match-delta" style="color:var(--red)">${m.loser_delta}</span>`;
      const wAvatar = m.winner.avatar_url ? `<img class="avatar-sm" src="${m.winner.avatar_url}" alt="">` : '';
      const lAvatar = m.loser.avatar_url  ? `<img class="avatar-sm" src="${m.loser.avatar_url}"  alt="">` : '';
      return `<div class="match-row">
        ${wAvatar}<span class="match-winner">🏆 ${escHtml(m.winner.display_name)}${cow(m.winner_id)}</span>
        ${wElo}
        <span class="match-vs">vs</span>
        ${lAvatar}<span class="match-loser">${escHtml(m.loser.display_name)}${cow(m.loser_id)}</span>
        ${lElo}
        <span class="match-meta">${m.format}pts · ${date}</span>
      </div>`;
    }).join('');

    document.getElementById('page-info').textContent  = `${page + 1} / ${totalPages}`;
    document.getElementById('btn-prev').disabled = page === 0;
    document.getElementById('btn-next').disabled = page >= totalPages - 1;
  }

  window.changePage = (dir) => {
    currentPage += dir;
    loadMatches(currentPage);
    document.getElementById('matches-list').scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  // Recherche par joueur
  let searchTimer;
  document.getElementById('match-search').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    const q = e.target.value.trim();
    searchTimer = setTimeout(async () => {
      if (!q) { searchIds = null; currentPage = 0; loadMatches(0); return; }
      const { data: pls } = await sb.from('players').select('id').ilike('display_name', `%${q}%`);
      searchIds = (pls ?? []).map(p => p.id);
      currentPage = 0;
      loadMatches(0);
    }, 250);
  });

  // ── Graph ─────────────────────────────────────────────────────────────────────

  let chartInstance   = null;
  let allPlayers      = [];
  let checkedPlayers  = new Set();
  let snapshotsByPlayer = {};
  let allDates        = [];

  const INACTIVE_DAYS = 14;

  async function loadGraph() {
    let rq = sb.from('matches').select('winner_id, loser_id, played_at').order('played_at', { ascending: false });
    rq = seasonFilterMatches(rq);
    const [{ data: players }, { data: snapsRaw }, { data: recent }] = await Promise.all([
      sb.from('players').select('id, display_name, avatar_url').order('elo', { ascending: false }),
      sb.from('elo_snapshots').select('player_id, elo, date').order('date'),
      rq,
    ]);

    if (!players) return;

    // Snapshots bornés à la saison
    const startDate = viewedSeason.started_at.slice(0, 10);
    const endDate   = viewedSeason.ended_at ? viewedSeason.ended_at.slice(0, 10) : '9999-12-31';
    const snaps = (snapsRaw ?? []).filter(s => s.date >= startDate && s.date <= endDate);

    // Dernière activité par joueur (dernier match de la saison)
    const lastPlayed = {};
    for (const m of recent ?? []) {
      if (!lastPlayed[m.winner_id]) lastPlayed[m.winner_id] = m.played_at;
      if (!lastPlayed[m.loser_id])  lastPlayed[m.loser_id]  = m.played_at;
    }
    // Inactivité relative à la fin de saison (ou maintenant si en cours)
    const refTime = viewedSeason.ended_at ? new Date(viewedSeason.ended_at).getTime() : Date.now();
    const cutoff  = refTime - INACTIVE_DAYS * 86400000;

    // On ne garde que les joueurs actifs (match dans les 14 derniers jours de la saison)
    allPlayers = players.filter(p => lastPlayed[p.id] && new Date(lastPlayed[p.id]).getTime() >= cutoff);
    checkedPlayers = new Set(allPlayers.map(p => p.id));

    // Regrouper les snapshots par joueur
    snapshotsByPlayer = {};
    for (const s of snaps ?? []) {
      if (!snapshotsByPlayer[s.player_id]) snapshotsByPlayer[s.player_id] = {};
      snapshotsByPlayer[s.player_id][s.date] = s.elo;
    }

    // Toutes les dates uniques triées
    allDates = [...new Set((snaps ?? []).map(s => s.date))].sort();

    // Checkboxes (joueurs actifs uniquement)
    document.getElementById('player-checkboxes').innerHTML = allPlayers.map((p, i) => {
      const color = CHART_COLORS[i % CHART_COLORS.length];
      return `<label class="player-check checked" style="--color:${color}" id="chk-${p.id}">
        <input type="checkbox" checked onchange="togglePlayer('${p.id}', this)">
        <span class="check-dot"></span>
        ${p.avatar_url ? `<img class="avatar-sm" src="${p.avatar_url}" alt="">` : ''}
        ${escHtml(p.display_name)}${cow(p.id)}
      </label>`;
    }).join('');

    renderChart();
  }

  window.togglePlayer = (id, checkbox) => {
    if (checkbox.checked) checkedPlayers.add(id);
    else checkedPlayers.delete(id);
    const label = document.getElementById('chk-' + id);
    if (label) label.classList.toggle('checked', checkbox.checked);
    renderChart();
  };

  window.toggleAllPlayers = () => {
    const allChecked = checkedPlayers.size === allPlayers.length;
    allPlayers.forEach((p, i) => {
      const label    = document.getElementById('chk-' + p.id);
      const checkbox = label?.querySelector('input');
      const check    = !allChecked;
      if (checkbox) checkbox.checked = check;
      if (label) label.classList.toggle('checked', check);
      if (check) checkedPlayers.add(p.id);
      else checkedPlayers.delete(p.id);
    });
    renderChart();
  };

  function renderChart() {
    const ctx = document.getElementById('elo-chart-canvas').getContext('2d');

    const labels   = allDates.map(d => {
      const [y, m, day] = d.split('-');
      return `${day}/${m}`;
    });

    const datasets = allPlayers
      .filter(p => checkedPlayers.has(p.id))
      .map((p, idx) => {
        const color   = CHART_COLORS[allPlayers.indexOf(p) % CHART_COLORS.length];
        const snapMap = snapshotsByPlayer[p.id] ?? {};
        let lastElo   = null;
        const dataPoints = allDates.map(d => {
          if (snapMap[d] !== undefined) lastElo = snapMap[d];
          return lastElo;
        });
        return {
          label:           p.display_name + cow(p.id),
          data:            dataPoints,
          borderColor:     color,
          backgroundColor: color + '22',
          borderWidth:     2,
          pointRadius:     3,
          pointHoverRadius:6,
          tension:         0.3,
          spanGaps:        true,
        };
      });

    if (chartInstance) {
      chartInstance.data.labels   = labels;
      chartInstance.data.datasets = datasets;
      chartInstance.update('none');
      return;
    }

    chartInstance = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive:          true,
        maintainAspectRatio: false,
        interaction: { mode: 'nearest', axis: 'xy', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            mode:            'nearest',
            axis:            'xy',
            intersect:       false,
            backgroundColor: '#1c1c2a',
            borderColor:     '#2a2a3a',
            borderWidth:     1,
            titleColor:      '#e8e8f0',
            bodyColor:       '#9ca3af',
            padding:         10,
            displayColors:   true,
            callbacks: {
              label: ctx => ` ${ctx.dataset.label} — ${ctx.parsed.y} ELO`,
            },
          },
        },
        scales: {
          x: {
            grid:  { color: '#2a2a3a' },
            ticks: { color: '#666680', font: { size: 11 } },
          },
          y: {
            grid:  { color: '#2a2a3a' },
            ticks: { color: '#666680', font: { size: 11 } },
          },
        },
      },
    });
    // Re-mesure au frame suivant (sécurité si le conteneur n'était pas encore dimensionné)
    requestAnimationFrame(() => chartInstance && chartInstance.resize());
  }

  // ── Modal stats ──────────────────────────────────────────────────────────────

  window.openModal = async (playerId, name) => {
    document.getElementById('modal-name').innerHTML = name;
    document.getElementById('modal-content').innerHTML = '<p class="loading">Chargement...</p>';
    document.getElementById('modal-overlay').classList.add('open');

    const [{ data: player }, { data: wins }, { data: losses }, { data: top1 }] = await Promise.all([
      sb.from('players').select('*').eq('id', playerId).single(),
      sb.from('matches').select('loser_id, players!matches_loser_id_fkey(display_name)').eq('winner_id', playerId),
      sb.from('matches').select('winner_id, players!matches_winner_id_fkey(display_name)').eq('loser_id', playerId),
      sb.from('top1_log').select('started_at, ended_at').eq('player_id', playerId),
    ]);

    const total   = player.wins + player.losses;
    const winrate = total > 0 ? Math.round(player.wins / total * 100) : 0;

    const top1Days = (top1 ?? []).reduce((sum, r) => {
      const s = new Date(r.started_at).getTime();
      const e = r.ended_at ? new Date(r.ended_at).getTime() : Date.now();
      return sum + (e - s);
    }, 0);
    const days = Math.floor(top1Days / 86400000);

    const lossMap = {};
    for (const m of losses ?? []) {
      const k = m.winner_id;
      if (!lossMap[k]) lossMap[k] = { name: m.players.display_name, count: 0 };
      lossMap[k].count++;
    }
    const beteNoire = Object.values(lossMap).sort((a, b) => b.count - a.count)[0];

    const winMap = {};
    for (const m of wins ?? []) {
      const k = m.loser_id;
      if (!winMap[k]) winMap[k] = { name: m.players.display_name, count: 0 };
      winMap[k].count++;
    }
    const victime = Object.values(winMap).sort((a, b) => b.count - a.count)[0];

    document.getElementById('modal-name').innerHTML =
      `${player.avatar_url ? `<img class="avatar" style="width:48px;height:48px;vertical-align:middle;margin-right:10px" src="${player.avatar_url}" alt="">` : ''}${escHtml(name)}${cow(playerId)}`;

    document.getElementById('modal-content').innerHTML = `
      <div class="stat-grid">
        <div class="stat-box"><div class="val">${player.elo}</div><div class="lbl">ELO</div></div>
        <div class="stat-box"><div class="val">${winrate}%</div><div class="lbl">Winrate</div></div>
        <div class="stat-box"><div class="val">${days > 0 ? days + 'j' : '—'}</div><div class="lbl">Jours top 1</div></div>
        <div class="stat-box"><div class="val" style="color:var(--green)">${player.wins}</div><div class="lbl">Victoires</div></div>
        <div class="stat-box"><div class="val" style="color:var(--red)">${player.losses}</div><div class="lbl">Défaites</div></div>
        <div class="stat-box"><div class="val">${total}</div><div class="lbl">Matchs</div></div>
      </div>
      ${beteNoire ? `
      <div class="stat-row">
        <span class="icon">😈</span>
        <div class="info"><div class="name">${escHtml(beteNoire.name)}</div><div class="count">Bête noire — ${beteNoire.count} défaite(s)</div></div>
      </div>` : ''}
      ${victime ? `
      <div class="stat-row">
        <span class="icon">🎯</span>
        <div class="info"><div class="name">${escHtml(victime.name)}</div><div class="count">Victime préférée — ${victime.count} victoire(s)</div></div>
      </div>` : ''}
    `;
  };

  document.getElementById('modal-close').onclick = () =>
    document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('modal-overlay').onclick = (e) => {
    if (e.target === document.getElementById('modal-overlay'))
      document.getElementById('modal-overlay').classList.remove('open');
  };

  // ── Utils ─────────────────────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Init ─────────────────────────────────────────────────────────────────────
  (async () => {
    await loadSeasons();
    await loadLeaderboard();
    if (initTab === 'graph' && !chartInstance) loadGraph();
    loadMatches();
  })();
  setInterval(() => { loadLeaderboard(); loadMatches(); }, 30_000);
</script>
</body>
